name: Run build and linter

on:
    pull_request: {}
    merge_group: {}

jobs:
    build-and-lint:
        name: Build and lint
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '24'
            - name: Setup pnpm
              uses: pnpm/action-setup@v6
            - name: Install dependencies
              run: pnpm install
            - name: Run linter checks
              run: pnpm run lint
            - name: Build with Vite
              run: pnpm run build
